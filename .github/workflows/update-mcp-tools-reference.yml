name: "Util: Update MCP Tools Reference"

# Dispatched by the n8n "MCP Docs Automation" workflow after it has already
# pushed the regenerated reference file to `head_branch`. This Action opens the
# draft PR using the repo's GitHub App token and notifies the docs team on Slack.

on:
  workflow_dispatch:
    inputs:
      head_branch:
        description: "Branch (already pushed with the updated reference) to open the PR from"
        required: true
        type: string
      source_pr_number:
        description: "n8n-io/n8n PR number that triggered this"
        required: true
        type: string
      source_pr_title:
        description: "Title of the source PR"
        required: false
        type: string
      source_pr_url:
        description: "URL of the source PR"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - name: Open draft PR
        id: create-pr
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          HEAD: ${{ inputs.head_branch }}
          SRC_NUM: ${{ inputs.source_pr_number }}
          SRC_TITLE: ${{ inputs.source_pr_title }}
          SRC_URL: ${{ inputs.source_pr_url }}
        run: |
          PR_URL=$(gh pr create \
            --repo n8n-io/n8n-docs \
            --base main \
            --head "$HEAD" \
            --draft \
            --title "docs: update MCP tools reference (n8n#${SRC_NUM})" \
            --body "Automated update of the MCP tools reference, triggered by merged PR ${SRC_URL} (${SRC_TITLE}). Generated by the MCP Docs Automation workflow and opened as a draft for review.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notify docs team on Slack
        uses: slackapi/slack-github-action@v2.1.0 # pin to a commit SHA per your repo's policy
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "C0350564QTG"
            text: ":memo: MCP tools reference draft PR opened: ${{ steps.create-pr.outputs.pr_url }} — triggered by n8n#${{ inputs.source_pr_number }} (${{ inputs.source_pr_url }})"
