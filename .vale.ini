StylesPath = "styles"
MinAlertLevel = warning
Vocab = default
[*.md]
BasedOnStyles = from-write-good, n8n-styles, from-microsoft, Vale
Vale.Terms = NO
from-alex.Profanity = NO
from-microsoft.Quotes = NO
TokenIgnores = (\-\-8\<\-\- \".*\"), (-only), (\*\*.*\*\*), (\*\*Release date:\*\*.*), (\[\[\%.*\%\]\]), (\[\[.*\]\]), (Rocket\.Chat), (\(https.*\)), (\{%[^%]*%\}),

# Changelog pages use "vX.Y" as intentional shorthand in page titles and headings,
# and reference many external service/API versions. Don't lint n8n version format there.
[docs/changelog/**]
n8n-styles.version-format = NO

# The style guide documents this rule, so it contains counter-examples on purpose.
[docs/contribute/style-guide-for-n8n-docs.md]
n8n-styles.version-format = NO
