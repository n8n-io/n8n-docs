          description: Paginate through rows by setting the cursor parameter to a nextCursor attribute returned by a previous request. Default value fetches the first "page" of the collection.
          nullable: true
          example: MTIzZTQ1NjctZTg5Yi0xMmQzLWE0NTYtNDI2NjE0MTc0MDA
    insertRowsRequest:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Array of rows to insert. Each row is an object with column names as keys.
          minItems: 1
        returnType:
          type: string
          enum:
            - count
            - id
            - all
          default: count
          description: |
            - count: Return only the number of rows inserted
            - id: Return an array of inserted row IDs
            - all: Return the full row data for all inserted rows
      required:
        - data
    updateRowsRequest:
      type: object
      properties:
        filter:
          type: object
          properties:
            type:
              type: string
              enum:
                - and
                - or
              default: and
            filters:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  columnName:
                    type: string
                  condition:
                    type: string
                    enum:
                      - eq
                      - neq
                      - like
                      - ilike
                      - gt
                      - gte
                      - lt
                      - lte
                  value: {}
                required:
                  - columnName
                  - condition
                  - value
          required:
            - filters
          description: Filter conditions to match rows for update
        data:
          type: object
          additionalProperties: true
          description: Column values to update
        returnData:
          type: boolean
          default: false
          description: If true, return the updated rows; if false, return true on success
        dryRun:
          type: boolean
          default: false
          description: If true, preview changes without persisting them
      required:
        - filter
        - data
    upsertRowRequest:
      type: object
      properties:
        filter:
          type: object
          properties:
            type:
              type: string
              enum:
                - and
                - or
              default: and
            filters:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  columnName:
                    type: string
                  condition:
                    type: string
                    enum:
                      - eq
                      - neq
                      - like
                      - ilike
                      - gt
                      - gte
                      - lt
                      - lte
                  value: {}
                required:
                  - columnName
                  - condition
                  - value
          required:
            - filters
          description: Filter conditions to match existing row. If no row matches, a new row is inserted.
        data:
          type: object
          additionalProperties: true
          description: Column values for the row
        returnData:
          type: boolean
          default: false
          description: If true, return the upserted row; if false, return true on success
        dryRun:
          type: boolean
          default: false
          description: If true, preview changes without persisting them
      required:
        - filter
        - data
    projectList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/project'
        nextCursor:
          type: string
          description: Paginate through projects by setting the cursor parameter to a nextCursor attribute returned by a previous request. Default value fetches the first "page" of the collection.
          nullable: true
          example: MTIzZTQ1NjctZTg5Yi0xMmQzLWE0NTYtNDI2NjE0MTc0MDA
    projectMember:
      type: object
      description: A project member (user with their role in the project).
      properties:
        id:
          type: string
          description: The user's unique identifier.
          readOnly: true
          example: 123e4567-e89b-12d3-a456-426614174000
        email:
          type: string
          format: email
          description: The user's email address.
          readOnly: true
          example: john.doe@company.com
        firstName:
          type: string
          maxLength: 32
          description: The user's first name.
          readOnly: true
          example: john
        lastName:
          type: string
          maxLength: 32
          description: The user's last name.
          readOnly: true
          example: Doe
        createdAt:
          type: string
          format: date-time
          description: When the user was created.
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          description: When the user was last updated.
          readOnly: true
        role:
          type: string
          description: The user's role in the project (e.g. project:admin, project:viewer).
          readOnly: true
          example: project:viewer
    projectMemberList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/projectMember'
        nextCursor:
          type: string
          description: Paginate through project members by setting the cursor parameter to the nextCursor attribute returned by a previous request. Default value fetches the first page of the collection.
          nullable: true
          example: MTIzZTQ1NjctZTg5Yi0xMmQzLWE0NTYtNDI2NjE0MTc0MDA
    communityPackage:
      type: object
      properties:
        packageName:
          type: string
          description: npm package name
        installedVersion:
          type: string
          description: Currently installed version
        authorName:
          type: string
          description: Package author name
        authorEmail:
          type: string
          description: Package author email
        installedNodes:
          type: array
          description: Nodes included in this package
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              latestVersion:
                type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        updateAvailable:
          type: string
          description: Version available for update, if any
        failedLoading:
          type: boolean
          description: Whether the package failed to load
    communityPackageList:
      type: array
      items:
        $ref: '#/components/schemas/communityPackage'
    installCommunityPackageRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: npm package name (must start with n8n-nodes-)
        version:
          type: string
          description: Specific semver version to install
        verify:
          type: boolean
          description: |
            Whether to verify the package against the n8n-vetted package list. Required when the instance has N8N_UNVERIFIED_PACKAGES_ENABLED=false.
    insights:
      type: object
      required:
        - total
        - failed
        - failureRate
        - timeSaved
        - averageRunTime
      properties:
        total:
          type: object
          required:
            - value
            - deviation
            - unit
          properties:
            value:
              type: number
            deviation:
              type: number
              nullable: true
            unit:
              type: string
              enum:
                - count
        failed:
          type: object
          required:
            - value
            - deviation
            - unit
          properties:
            value:
              type: number
            deviation:
              type: number
              nullable: true
            unit:
              type: string
              enum:
                - count
        failureRate:
          type: object
          required:
            - value
            - deviation
            - unit
          properties:
            value:
              type: number
            deviation:
              type: number
              nullable: true
            unit:
              type: string
              enum:
                - ratio
        timeSaved:
          type: object
          required:
            - value
            - deviation
            - unit
          properties:
            value:
              type: number
            deviation:
              type: number
              nullable: true
            unit:
              type: string
              enum:
                - minute
        averageRunTime:
          type: object
          required:
            - value
            - deviation
            - unit
          properties:
            value:
              type: number
            deviation:
              type: number
              nullable: true
            unit:
              type: string
              enum:
                - millisecond
    folder:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          example: My Folder
        parentFolderId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    folder.create:
      type: object
